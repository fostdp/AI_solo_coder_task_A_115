<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代投石机弹道动力学仿真与攻城效能评估系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-left">
                <h1>🏰 古代投石机弹道动力学仿真系统</h1>
                <p class="subtitle">Siege Ballistics Simulation &amp; Effectiveness Assessment</p>
            </div>
            <div class="header-right">
                <div class="status-badge" id="connectionStatus">
                    <span class="dot"></span>
                    <span>连接中...</span>
                </div>
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>投石机列表</h3>
                    <div class="trebuchet-list" id="trebuchetList">
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>城墙类型</h3>
                    <div class="wall-selector" id="wallSelector">
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>投射参数</h3>
                    <div class="param-controls">
                        <div class="param-item">
                            <label>初速 (m/s)</label>
                            <input type="range" id="velocitySlider" min="10" max="100" value="50" step="1">
                            <span id="velocityValue">50</span>
                        </div>
                        <div class="param-item">
                            <label>发射角 (°)</label>
                            <input type="range" id="angleSlider" min="20" max="70" value="45" step="1">
                            <span id="angleValue">45</span>
                        </div>
                        <div class="param-item">
                            <label>风速 (m/s)</label>
                            <input type="range" id="windSlider" min="0" max="30" value="0" step="0.5">
                            <span id="windValue">0</span>
                        </div>
                        <button class="btn-primary" id="fireBtn">🔥 发射</button>
                        <button class="btn-secondary" id="optimizeBtn">⚡ 优化参数</button>
                    </div>
                </div>
            </aside>

            <main class="viewport">
                <div id="canvasContainer"></div>

                <div class="hud-overlay">
                    <div class="hud-panel" id="hudBallistics">
                        <h4>弹道参数</h4>
                        <div class="hud-grid">
                            <div class="hud-item">
                                <span class="label">射程</span>
                                <span class="value" id="hudRange">-- m</span>
                            </div>
                            <div class="hud-item">
                                <span class="label">最大高度</span>
                                <span class="value" id="hudHeight">-- m</span>
                            </div>
                            <div class="hud-item">
                                <span class="label">飞行时间</span>
                                <span class="value" id="hudTime">-- s</span>
                            </div>
                            <div class="hud-item">
                                <span class="label">着速</span>
                                <span class="value" id="hudImpactVel">-- m/s</span>
                            </div>
                        </div>
                    </div>

                    <div class="hud-panel" id="hudSiege">
                        <h4>攻城效能</h4>
                        <div class="hud-grid">
                            <div class="hud-item">
                                <span class="label">冲击动能</span>
                                <span class="value" id="hudEnergy">-- kJ</span>
                            </div>
                            <div class="hud-item">
                                <span class="label">弹坑深度</span>
                                <span class="value" id="hudCrater">-- m</span>
                            </div>
                            <div class="hud-item">
                                <span class="label">损伤率</span>
                                <span class="value" id="hudDamage">-- %</span>
                            </div>
                            <div class="hud-item">
                                <span class="label">效能评分</span>
                                <span class="value score" id="hudScore">--</span>
                            </div>
                        </div>
                        <div class="damage-bar">
                            <div class="damage-fill" id="damageFill"></div>
                        </div>
                        <div class="damage-label" id="damageLabel">--</div>
                    </div>
                </div>

                <div class="view-controls">
                    <button class="view-btn" id="viewTop">俯视图</button>
                    <button class="view-btn" id="viewSide">侧视图</button>
                    <button class="view-btn" id="view3d">3D视图</button>
                    <button class="view-btn" id="viewReset">重置视角</button>
                </div>
            </main>
        </div>

        <div class="info-popup" id="infoPopup">
            <div class="popup-content">
                <button class="popup-close" id="popupClose">×</button>
                <h3 id="popupTitle">投石机详情</h3>
                <div class="popup-body" id="popupBody">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/trebuchet_3d.js"></script>
    <script src="js/ballistic_panel.js"></script>
</body>
</html>
